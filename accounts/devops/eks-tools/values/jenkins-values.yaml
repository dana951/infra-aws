# =========================
# Jenkins Controller Config
# =========================
controller:
  # Internal service (ALB will expose it)
  serviceType: ClusterIP

  # Disable JNLP (TCP 50000) agent listener; WebSocket agents are used instead
  agentListenerEnabled: false


  # ------------------------------------------------------------
  # External URL Configuration
  # ------------------------------------------------------------
  # Note - From jenkins chart README.md
  # If you are using the ingress definitions provided by this chart via the 
  # `controller.ingress` block the configured hostname will be the ingress hostname 
  # starting with `https://` or `http://` depending on the `tls` configuration.
  # The Protocol can be overwritten by specifying `controller.jenkinsUrlProtocol`.
  
  # jenkinsUrlProtocol: "https"

  # Note - From jenkins chart README.md
  # If you are not using the provided ingress you can specify `
  # controller.jenkinsUrl` to change the URL definition.
  jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"

  # -------------------------
  # Ingress (AWS ALB)
  # -------------------------
  ingress:
    enabled: false
    hostName: jenkins.example.com
    # Use the AWS Load Balancer Controller
    ingressClassName: alb
    annotations:
      # Joins this Ingress with others (e.g argocd) into a single physical ALB
      alb.ingress.kubernetes.io/group.name: dev-tools-alb
      # Creates a public-facing load balancer
      alb.ingress.kubernetes.io/scheme: internet-facing
      # Routes traffic directly to Pod IPs for better performance in EKS
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
      # ToDo - Check E2E encryption
      # # External ports the ALB will open to the world
      # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
      # # Forces all port 80 traffic to redirect to 443 automatically
      # alb.ingress.kubernetes.io/ssl-redirect: '443'
      # The ARN for your ACM Wildcard certificate (*.example.com)
      # Same ACM certificate used for host-based routing
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/UUID

      # ExternalDNS for the single domain
      external-dns.alpha.kubernetes.io/hostname: jenkins.example.com
      
      # Since insecure is false, ALB must talk to pods via HTTPS
      alb.ingress.kubernetes.io/backend-protocol: HTTPS
      alb.ingress.kubernetes.io/healthcheck-protocol: HTTPS
      alb.ingress.kubernetes.io/healthcheck-path: /healthz

      # ------------------------------------------------------------
      # Sequrity Groups:
      # ------------------------------------------------------------
      # Automatically creates a Security Group and restricts access to these IPs
      # alb.ingress.kubernetes.io/inbound-cidrs: "1.2.3.4/32, 5.6.7.8/32"

      # OR

      # Attach your existing Security Group ID
      # and tell the controller to still manage the "internal" rules 
      # so the ALB can reach the Argo CD pods on the EKS nodes
      # alb.ingress.kubernetes.io/security-groups: sg-1234567890abcdef0
      # alb.ingress.kubernetes.io/manage-backend-security-group-rules: "true"


  # -------------------------
  # Node placement (jenkins node group)
  # -------------------------
  nodeSelector:
    workload/node-group: jenkins

  # -------------------------
  # Plugins
  # -------------------------
  installPlugins:
    - kubernetes:4423.vb_59f230b_ce53
    - workflow-aggregator:608.v67378e9d3db_1
    - git:5.10.1
    - configuration-as-code:2061.vc08919f7fc37
    - job-dsl:3654.vdf58f53e2d15
    # - aws-secrets-manager-credentials-provider:2.87.v49cc86c50c3b_ - dependencies issues for this plugin

  # -------------------------
  # JCasC (basic)
  # -------------------------
  JCasC:
    defaultConfig: true
    configScripts:
      jenkins-config: |
        jenkins:
          systemMessage: "Jenkins managed via Helm + JCasC"

          # -------------------------
          # SECURITY REALM (Authentication)
          # -------------------------
          securityRealm:
            local:
              allowsSignup: false   # Users cannot self-register

          # -------------------------
          # AUTHORIZATION STRATEGY (Permissions)
          # -------------------------
          authorizationStrategy:
            loggedInUsersCanDoAnything:
              allowAnonymousRead: false

          # -------------------------
          # KUBERNETES CLOUD (Agents)
          # -------------------------
          # Jenkins uses Kubernetes to dynamically create build agents (pods).
          clouds:
            - kubernetes:
                name: "kubernetes"
                # RECOMMENDED: Enables single-port communication over HTTP
                webSocket: true
                skipTlsVerify: true

                # Limits the number of concurrent agent pods Jenkins can create.
                # Prevents cluster overload and controls cost (for this demo).
                containerCapStr: "5"
                namespace: "jenkins-agents"  # build agents will run in this namespace

        # -------------------------
        # GLOBAL CONFIGURATION
        # -------------------------
        unclassified:
          location:
            # Admin contact (appears in UI/system emails)
            adminAddress: "devops-demo@example.com"

          # -------------------------
          # Shared Jenkins Library
          # -------------------------
          globalLibraries:
            libraries:
              - name: "jenkins-shared-lib"
                defaultVersion: "jenkins"
                retriever:
                  modernSCM:
                    scm:
                      git:
                        remote: "https://github.com/dana951/jenkins-shared-lib.git"

        # -------------------------
        # JOB DEFINITION (Pipeline)
        # -------------------------
        # Automatically creates a pipeline job when Jenkins starts.
        # needs job-dsl Plugin
        jobs:
          - script: >
              pipelineJob('podinfo-pr-validation') {
                description('Validation pipeline for Pull Requests.')
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/dana951/app-source.git')
                        }
                        branches('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile.dev')
                  }
                }
              }

          - script: >
              pipelineJob('podinfo-prod-deploy') {
                description('Production deployment pipeline for merged code.')
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/dana951/app-source.git')
                        }
                        branches('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile.prod')
                  }
                }
              }

  # -------------------------
  # Sidecar (auto reload JCasC)
  # -------------------------
  sidecars:
    configAutoReload:
      enabled: true

# -------------------------
# Persistence (EBS) DISABLED for POC, enable in Production
# -------------------------
persistence:
  enabled: false
  storageClass: ebs-csi
  accessMode: ReadWriteOnce
  size: 20Gi

# =========================
# Jenkins Agents Config
# =========================
agent:
  enabled: true

  # Agents in separate namespace
  namespace: jenkins-agents
  serviceAccountName: jenkins-agent

  # Schedule only on agent node group
  nodeSelector:
    workload/node-group: jenkins-agents

# =========================
# Service Account (for Agents)
# =========================
# This handles the actual creation of the ServiceAccount object
serviceAccountAgent:
  create: true
  name: jenkins-agent

# =========================
# RBAC
# =========================
rbac:
  create: true

# =========================
# Service Account (for IRSA)
# =========================
serviceAccount:
  create: true
  name: jenkins

# =========================
# Extra Objects
# =========================
extraObjects:
  # Define the Role in the 'argocd' namespace
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      namespace: argocd
      name: jenkins-agent-argocd-read-role
    rules:
      - apiGroups: ["argoproj.io"]
        resources: ["applications"]
        verbs: ["get", "list", "watch"]

  # Bind the 'jenkins-agent' ServiceAccount to this Role
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      namespace: argocd
      name: jenkins-agent-argocd-read-binding
    subjects:
      - kind: ServiceAccount
        name: jenkins-agent
        namespace: jenkins-agents
    roleRef:
      kind: Role
      name: jenkins-agent-argocd-read-role
      apiGroup: rbac.authorization.k8s.io
